name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: musegrid-v2-standalone/package-lock.json

      - name: Install dependencies
        working-directory: musegrid-v2-standalone
        run: npm ci

      - name: Build
        working-directory: musegrid-v2-standalone
        env:
          VITE_MUSEGRID_API_BASE: https://musegrid-api.wzy08080808.workers.dev
        run: |
          rm -rf dist
          npm run build

      - name: Verify work detail bundle
        working-directory: musegrid-v2-standalone
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const assetsDir = path.join(process.cwd(), 'dist', 'assets');
          const assets = fs.readdirSync(assetsDir);
          const jsBundle = assets.find((file) => /^index-.*\.js$/.test(file));

          if (!jsBundle) {
            throw new Error('Missing main JS bundle in dist/assets');
          }

          const bundlePath = path.join(assetsDir, jsBundle);
          const bundle = fs.readFileSync(bundlePath, 'utf8');
          const probes = ['作品舞台', '快捷分享', '模锯初收（未来 7 天）', '真值链路', '编辑歌曲信息', '保存修改'];

          for (const probe of probes) {
            if (!bundle.includes(probe)) {
              throw new Error(`Built bundle is stale or incorrect: missing "${probe}" in ${jsBundle}`);
            }
          }

          if (!assets.some((file) => /^work-cover-rain-night-.*\.jpg$/.test(file))) {
            throw new Error('Built bundle is missing the work detail cover asset');
          }

          console.log(`Verified bundle ${jsBundle}`);
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: musegrid-v2-standalone/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
